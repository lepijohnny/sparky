name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules
        working-directory: server
        run: pnpm rebuild better-sqlite3 sqlite-vec

      - name: Bundle server
        working-directory: server
        run: npx tsx build.ts

      - name: Check dist size
        run: du -sh server/dist/ && du -sh server/dist/node_modules/*/ | sort -rh

      - name: Build frontend
        working-directory: app
        run: pnpm run build

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 -D > $CERT_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign native binaries
        run: |
          find server/dist src-tauri/binaries -type f \( -name "*.node" -o -name "*.dylib" -o -name "*.so" -o -name "node-*" -o -name "node" \) | while read f; do
            echo "Signing $f"
            codesign --force --sign "Developer ID Application: Nikola Radin (98B89CT333)" --timestamp "$f"
          done

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Nikola Radin (98B89CT333)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: "98B89CT333"
        run: cargo tauri build --ci --bundles app,dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules
        working-directory: server
        run: pnpm rebuild better-sqlite3 sqlite-vec

      - name: Bundle server
        working-directory: server
        run: npx tsx build.ts

      - name: Check dist contents
        shell: bash
        run: |
          echo "=== dist size ==="
          du -sh server/dist/
          echo "=== dist/node_modules ==="
          ls -la server/dist/node_modules/ || echo "NO node_modules!"
          echo "=== .pnpm stores ==="
          ls server/node_modules/.pnpm/ | head -10 || echo "no server .pnpm"
          ls node_modules/.pnpm/ | head -10 || echo "no root .pnpm"

      - name: Build frontend
        working-directory: app
        run: pnpm run build

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --ci --bundles nsis

      - name: Debug bundled binaries
        shell: bash
        run: |
          echo "=== src-tauri/binaries ==="
          ls -la src-tauri/binaries/ || true
          echo "=== NSIS output ==="
          ls -la src-tauri/target/release/bundle/nsis/ || true
          echo "=== Full bundle tree ==="
          find src-tauri/target/release/bundle -type f -name "node*" 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug artifacts
        run: find artifacts -type f | head -50

      - name: Generate latest.json
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MAC_TAR_PATH=$(ls artifacts/macos-aarch64/macos/*.app.tar.gz)
          MAC_TAR=$(basename "$MAC_TAR_PATH")
          MAC_SIG=$(cat "${MAC_TAR_PATH}.sig")

          WIN_EXE_PATH=$(ls artifacts/windows-x64/*.exe | head -1)
          WIN_EXE=$(basename "$WIN_EXE_PATH")
          WIN_SIG=$(cat "${WIN_EXE_PATH}.sig")

          cat > latest.json <<EOF
          {
            "version": "${TAG#v}",
            "notes": "See https://github.com/lepijohnny/sparky/releases/tag/${TAG}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/lepijohnny/sparky/releases/download/${TAG}/${MAC_TAR}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/lepijohnny/sparky/releases/download/${TAG}/${WIN_EXE}"
              }
            }
          }
          EOF

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header
        env:
          OUTPUT: release-notes.md

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/macos-aarch64/dmg/*.dmg
            artifacts/macos-aarch64/macos/*.app.tar.gz
            artifacts/macos-aarch64/macos/*.app.tar.gz.sig
            artifacts/windows-x64/*.exe
            artifacts/windows-x64/*.exe.sig
            latest.json
