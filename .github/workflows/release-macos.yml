name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules
        working-directory: server
        run: pnpm rebuild better-sqlite3 sqlite-vec

      - name: Bundle server
        working-directory: server
        run: npx tsx build.ts

      - name: Check dist size
        run: du -sh server/dist/ && du -sh server/dist/node_modules/*/ | sort -rh

      - name: Build frontend
        working-directory: app
        run: pnpm run build

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 -D > $CERT_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign native binaries
        run: |
          find server/dist src-tauri/binaries -type f \( -name "*.node" -o -name "*.dylib" -o -name "*.so" -o -name "node-*" -o -name "node" \) | while read f; do
            echo "Signing $f"
            codesign --force --sign "Developer ID Application: Nikola Radin (98B89CT333)" --timestamp "$f"
          done

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Nikola Radin (98B89CT333)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: "98B89CT333"
        run: cargo tauri build --ci --bundles app,dmg

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header
        env:
          OUTPUT: release-notes.md

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release-notes.md
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig


