<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sparky</title>
    <style>
      body { margin: 0; background: #1e1e2e; overflow: hidden; }
      #preload {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;

        background: #1e1e2e;
        transition: opacity 0.5s ease;
      }
      #preload.fadeOut { opacity: 0; pointer-events: none; }
      #preload .sparks {
        position: relative; width: 80px; height: 80px;
      }
      #preload .spark {
        position: absolute; width: 6px; height: 6px; border-radius: 50%;
        background: #fab387; opacity: 0; top: 50%; left: 50%;
        animation: sparkFloat 1.1s ease-in-out infinite;
      }
      #preload .spark:nth-child(1) { --dx:0px;--dy:-35px; animation-delay:0s; }
      #preload .spark:nth-child(2) { --dx:25px;--dy:-25px; animation-delay:.14s; }
      #preload .spark:nth-child(3) { --dx:35px;--dy:0px; animation-delay:.28s; }
      #preload .spark:nth-child(4) { --dx:25px;--dy:25px; animation-delay:.42s; }
      #preload .spark:nth-child(5) { --dx:0px;--dy:35px; animation-delay:.56s; }
      #preload .spark:nth-child(6) { --dx:-25px;--dy:25px; animation-delay:.7s; }
      #preload .spark:nth-child(7) { --dx:-35px;--dy:0px; animation-delay:.84s; }
      #preload .spark:nth-child(8) { --dx:-25px;--dy:-25px; animation-delay:.98s; }
      @keyframes sparkFloat {
        0% { opacity:0; transform:translate(-50%,-50%) scale(.5); }
        15% { opacity:1; transform:translate(-50%,-50%) scale(1); }
        100% { opacity:0; transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.3); }
      }
      #preload .status {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 16px; font-weight: 600; color: rgba(205,214,244,0.5);
        transition: opacity 0.3s ease;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div id="preload">
      <div class="sparks">
        <div class="spark"></div><div class="spark"></div>
        <div class="spark"></div><div class="spark"></div>
        <div class="spark"></div><div class="spark"></div>
        <div class="spark"></div><div class="spark"></div>
      </div>
      <div class="status" id="preload-status">Waking up...</div>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        try {
          var t = JSON.parse(localStorage.getItem("sparky-theme"));
          var isLight = !t && window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
          var bg = (t && t.bg) ? t.bg : (isLight ? "#ffffff" : "#1e1e2e");
          var fg = (t && t.fg) ? t.fg : (isLight ? "#4c4f69" : "#cdd6f4");
          var accent = (t && t.accent) ? t.accent : (isLight ? "#0969da" : "#fab387");
          document.body.style.background = bg;
          document.getElementById("preload").style.background = bg;
          document.getElementById("preload-status").style.color = fg + "80";
          var sparks = document.querySelectorAll("#preload .spark");
          for (var s = 0; s < sparks.length; s++) sparks[s].style.background = accent;
        } catch(e) {}

        var phrases = ["Waking up...","Tinkering...","Sparky...","Warming up circuits...","Conjuring sparks...","Gathering thoughts...","Almost there..."];
        var i = 0;
        var el = document.getElementById("preload-status");
        setInterval(function() {
          i = (i + 1) % phrases.length;
          el.style.opacity = "0";
          setTimeout(function() { el.textContent = phrases[i]; el.style.opacity = ""; }, 300);
        }, 2000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
