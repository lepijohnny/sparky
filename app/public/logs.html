<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sparky — Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "SF Mono", "Menlo", "Consolas", "Liberation Mono", monospace;
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-raised);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    #toolbar span { font-weight: 600; font-size: 13px; }
    #toolbar select, #toolbar button {
      -webkit-app-region: no-drag;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    #toolbar select:hover, #toolbar button:hover { background: var(--bg-overlay); }
    #header {
      padding: 8px 12px 4px;
      color: var(--fg-muted);
      font-size: 11px;
      flex-shrink: 0;
    }
    #code { flex: 1; overflow: auto; padding: 0; }
    .line {
      display: flex;
      padding: 0 12px;
      line-height: 1.7;
      border-left: 3px solid transparent;
    }
    .line:hover { background: var(--bg-raised); }
    .line-number {
      color: var(--fg-subtle);
      text-align: right;
      min-width: 40px;
      padding-right: 12px;
      user-select: none;
      flex-shrink: 0;
    }
    .line-content { white-space: pre; flex: 1; min-width: 0; }
    .level-DEBUG .line-content { color: var(--fg-subtle); }
    .level-INFO .line-content { color: var(--fg); }
    .level-WARN .line-content { color: #f9e2af; }
    .level-WARN { border-left-color: #f9e2af; }
    .level-ERROR .line-content { color: #f38ba8; }
    .level-ERROR { border-left-color: #f38ba8; }
    .empty { padding: 40px; text-align: center; color: var(--fg-muted); }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>Logs</span>
    <select id="level-filter">
      <option value="DEBUG">Debug</option>
      <option value="INFO" selected>Info</option>
      <option value="WARN">Warn</option>
      <option value="ERROR">Error</option>
    </select>
    <button id="btn-refresh">Refresh</button>
  </div>
  <div id="header"></div>
  <div id="code"></div>

  <script>
    /* ── Theme ── */
    function lum(hex) {
      var r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
      return 0.299*r + 0.587*g + 0.114*b;
    }
    function mix(a, b, t) {
      var r = Math.round(parseInt(a.slice(1,3),16)*(1-t)+parseInt(b.slice(1,3),16)*t);
      var g = Math.round(parseInt(a.slice(3,5),16)*(1-t)+parseInt(b.slice(3,5),16)*t);
      var bl = Math.round(parseInt(a.slice(5,7),16)*(1-t)+parseInt(b.slice(5,7),16)*t);
      return "#"+r.toString(16).padStart(2,"0")+g.toString(16).padStart(2,"0")+bl.toString(16).padStart(2,"0");
    }
    function hexToHSL(hex) {
      var r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
      var mx=Math.max(r,g,b), mn=Math.min(r,g,b), h=0, s=0, l=(mx+mn)/2;
      if(mx!==mn){var d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=((g-b)/d+(g<b?6:0))/6;else if(mx===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}
      return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
    }
    function applyTheme(bg, fg, accent) {
      var dk = lum(bg) < 0.5;
      var fgH = hexToHSL(fg)[0];
      var ac = accent || (dk ? "hsl("+fgH+",60%,65%)" : "hsl("+fgH+",45%,52%)");
      var s = document.documentElement.style;
      s.setProperty("--bg", dk ? bg : mix(bg, fg, 0.06));
      s.setProperty("--fg", fg);
      s.setProperty("--bg-raised", dk ? mix(bg, fg, 0.07) : mix(bg, fg, 0.02));
      s.setProperty("--bg-surface", dk ? mix(bg, fg, 0.12) : bg);
      s.setProperty("--bg-overlay", mix(bg, fg, 0.10));
      s.setProperty("--border", mix(bg, fg, dk ? 0.15 : 0.12));
      s.setProperty("--fg-muted", mix(bg, fg, dk ? 0.55 : 0.55));
      s.setProperty("--fg-subtle", mix(bg, fg, dk ? 0.35 : 0.35));
      s.setProperty("--accent", ac);
    }

    // Apply from URL params
    var params = new URLSearchParams(window.location.search);
    applyTheme(params.get("bg") || "#1e1e2e", params.get("fg") || "#cdd6f4", params.get("accent"));

    // Listen for live theme changes via BroadcastChannel
    try {
      var ch = new BroadcastChannel("sparky-theme");
      ch.onmessage = function(ev) {
        if (ev.data && ev.data.bg && ev.data.fg) applyTheme(ev.data.bg, ev.data.fg, ev.data.accent);
      };
    } catch(e) {}

    /* ── Log viewer ── */
    var codeEl = document.getElementById("code");
    var headerEl = document.getElementById("header");
    var levelFilter = document.getElementById("level-filter");
    var btnRefresh = document.getElementById("btn-refresh");
    var LEVELS = ["DEBUG", "INFO", "WARN", "ERROR"];
    var allLines = [];

    levelFilter.onchange = function() { render(); };
    btnRefresh.onclick = function() { loadLogs(); };

    function escapeHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function detectLevel(line) {
      if (line.includes("[DEBUG]")) return "DEBUG";
      if (line.includes("[INFO ")) return "INFO";
      if (line.includes("[WARN ")) return "WARN";
      if (line.includes("[ERROR]")) return "ERROR";
      return "INFO";
    }

    function render() {
      var minLevel = LEVELS.indexOf(levelFilter.value);
      var filtered = allLines.filter(function(l) { return LEVELS.indexOf(detectLevel(l)) >= minLevel; });
      if (filtered.length === 0) { codeEl.innerHTML = '<div class="empty">No log entries</div>'; return; }
      codeEl.innerHTML = filtered.map(function(line, i) {
        var level = detectLevel(line);
        return '<div class="line level-'+level+'"><span class="line-number">'+(i+1)+'</span><span class="line-content">'+escapeHtml(line)+'</span></div>';
      }).join("");
      codeEl.scrollTop = codeEl.scrollHeight;
    }

    function loadLogs() {
      var ipc = window.__TAURI_INTERNALS__;
      if (!ipc) { codeEl.innerHTML = '<div class="empty">Not running in Tauri</div>'; return; }
      var today = new Date().toISOString().slice(0, 10);
      ipc.invoke("open_log_file", { date: today }).then(function(content) {
        var lines = content.split("\n").filter(Boolean);
        var m = content.match(/^\.\.\.last 100 of (\d+) lines\.\.\./);
        if (m) { headerEl.textContent = "Showing last 100 of " + m[1] + " lines"; allLines = lines.slice(1); }
        else { headerEl.textContent = lines.length + " lines"; allLines = lines; }
        render();
      }).catch(function(err) {
        codeEl.innerHTML = '<div class="empty">Failed to load logs: ' + String(err) + '</div>';
      });
    }

    loadLogs();
  </script>
</body>
</html>
